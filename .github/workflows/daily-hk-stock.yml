name: Daily HK Stock Analysis

on:
  schedule:
    # 每天早8点运行 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  analyze-hk-stock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Fetch HK stock data
      run: |
        python src/modules/hk_stock/collector.py
    
    - name: Generate stock analysis report
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python src/modules/hk_stock/generator.py
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/hk_stock/ docs/
        git diff --staged --quiet || git commit -m "📈 Update HK stock analysis $(date +%Y-%m-%d)"
        git push
