name: Daily House Price Analysis

on:
  schedule:
    # 每天早8点运行 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  analyze-house-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Fetch house price data
      run: |
        python src/modules/house_price/collector.py
    
    - name: Generate house price report
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python src/modules/house_price/generator.py
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/house_price/ docs/
        git diff --staged --quiet || git commit -m "🏠 Update house price analysis $(date +%Y-%m-%d)"
        git push
