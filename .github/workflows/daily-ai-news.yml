name: Daily AI News Collection

on:
  schedule:
    # 每天早8点运行 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  collect-ai-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Collect AI news data
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python src/modules/ai_news/collector.py
    
    - name: Generate AI news report
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python src/modules/ai_news/generator.py
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/ai_news/ docs/
        git diff --staged --quiet || git commit -m "📰 Update AI news report $(date +%Y-%m-%d)"
        git push
