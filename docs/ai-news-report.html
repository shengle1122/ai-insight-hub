<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI行业动态 - AI Insight Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <style>
        body { background: #f8fafc; }
        .report-content { max-width: 900px; margin: 0 auto; }
        .nav-link { @apply text-blue-600 hover:text-blue-800 transition-colors; }
    </style>
</head>
<body>
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <a href="index.html" class="text-xl font-bold text-gray-800">← AI Insight Hub</a>
        </div>
    </nav>
    
    <main class="container mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-sm p-8">
            <div id="report" class="markdown-body">
                <div class="text-center py-12 text-gray-500">
                    <p>正在加载报告...</p>
                    <p class="text-sm mt-2">如果长时间未加载，请确保数据已生成</p>
                </div>
            </div>
        </div>
    </main>
    
    <footer class="text-center py-8 text-gray-500 text-sm">
        <p>数据每日自动更新 | 数据来源: Hacker News / arXiv / GitHub</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // 加载Markdown报告
        fetch('ai-news-report.md')
            .then(response => response.text())
            .then(text => {
                document.getElementById('report').innerHTML = marked.parse(text);
            })
            .catch(err => {
                document.getElementById('report').innerHTML = `
                    <div class="text-center py-12 text-red-500">
                        <p>报告加载失败</p>
                        <p class="text-sm mt-2">${err.message}</p>
                    </div>
                `;
            });
    </script>
</body>
</html>
